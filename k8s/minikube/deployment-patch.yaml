# Local overrides for the MemPalace Go server on minikube.
# Applied as a strategic-merge patch by the kustomize overlay (kustomization.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mempalace
spec:
  # Stateless, but one replica is plenty for a laptop cluster.
  replicas: 1
  template:
    spec:
      containers:
        - name: mempalace
          # Use the image baked into minikube's daemon, never pull.
          imagePullPolicy: IfNotPresent
          env:
            # Reach an embedding API (e.g. Ollama) running on the host machine.
            # host.minikube.internal resolves to the host from inside the cluster.
            # Make sure Ollama listens on all interfaces:
            #   OLLAMA_HOST=0.0.0.0 ollama serve
            - name: EMBED_API_URL
              value: "http://host.minikube.internal:11434/v1"
            # Enable the plain REST API too, so it's easy to poke with curl.
            - name: ENABLE_REST_API
              value: "true"
