# ============================================================================
# MemPalace — Secrets
# ============================================================================
# Do NOT commit real values. Use kubectl to create the secret directly:
#
#   DB_PASS=$(openssl rand -base64 24)
#   API_KEY=$(openssl rand -base64 32)
#
#   kubectl create secret generic mempalace-secrets \
#     --namespace mempalace \
#     --from-literal=api-key="$API_KEY" \
#     --from-literal=db-password="$DB_PASS" \
#     --from-literal=db-url="postgres://mempalace:${DB_PASS}@mempalace-db.mempalace.svc.cluster.local:5432/mempalace"
#
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mempalace-secrets
  namespace: mempalace
type: Opaque
data:
  # All values must be base64-encoded. Replace the placeholders below.
  api-key:     REPLACE_WITH_BASE64_ENCODED_API_KEY
  # Optional read-only key (only needed if you enable MCP_API_KEY_READONLY).
  # Must differ from api-key.
  api-key-readonly: REPLACE_WITH_BASE64_ENCODED_READONLY_API_KEY
  db-password: REPLACE_WITH_BASE64_ENCODED_DB_PASSWORD
  db-url:      REPLACE_WITH_BASE64_ENCODED_DB_URL
